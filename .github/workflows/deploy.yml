name: Deploy Veris

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: veris-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify target instance is online in SSM
        run: |
          set -euo pipefail
          PING_STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --query 'InstanceInformationList[0].PingStatus' \
            --output text)

          if [ "$PING_STATUS" != "Online" ]; then
            echo "EC2 instance is not online in SSM: $PING_STATUS"
            exit 1
          fi

      - name: Dispatch deploy via SSM Run Command
        env:
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
        run: |
          set -euo pipefail

          python3 <<'PY'
          import base64
          import json
          import os
          import shlex
          from pathlib import Path

          ec2_user = os.environ["EC2_USER"]
          repo_url = f'https://x-access-token:***@github.com/{os.environ["GITHUB_REPOSITORY"]}.git'
          prod_env_b64 = base64.b64encode(os.environ["PROD_ENV_FILE"].encode()).decode()

          deploy_script = "\n".join(
              [
                  "set -euxo pipefail",
                  "export HOME=/root",
                  f"DEPLOY_USER={shlex.quote(ec2_user)}",
                  f"APP_DIR=/home/{ec2_user}/veris",
                  f"REPO_URL={shlex.quote(repo_url)}",
                  'if id "$DEPLOY_USER" >/dev/null 2>&1; then',
                  '  chown -R "$DEPLOY_USER":"$DEPLOY_USER" "$APP_DIR" || true',
                  'fi',
                  'git config --global --add safe.directory "$APP_DIR"',
                  'if [ ! -d "$APP_DIR/.git" ]; then',
                  '  rm -rf "$APP_DIR"',
                  '  git clone "$REPO_URL" "$APP_DIR"',
                  "fi",
                  'cd "$APP_DIR"',
                  'git remote set-url origin "$REPO_URL"',
                  "git fetch origin",
                  "git checkout main",
                  "git reset --hard origin/main",
                  f"printf %s {shlex.quote(prod_env_b64)} | base64 --decode > .env.production",
                  'if id "$DEPLOY_USER" >/dev/null 2>&1; then',
                  '  chown "$DEPLOY_USER":"$DEPLOY_USER" .env.production || true',
                  'fi',
                  "docker compose --env-file .env.production -f docker-compose.prod.yml pull caddy db",
                  "docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans",
                  "docker compose --env-file .env.production -f docker-compose.prod.yml ps",
                  "docker image prune -f",
              ]
          )

          params = {
              "commands": [
                  "cat > /tmp/veris-deploy.sh <<'SCRIPT'\n" + deploy_script + "\nSCRIPT",
                  "bash /tmp/veris-deploy.sh",
              ]
          }

          Path('/tmp/ssm-params.json').write_text(json.dumps(params))
          PY

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Veris ${GITHUB_SHA}" \
            --parameters file:///tmp/ssm-params.json \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $COMMAND_ID"

          STATUS="Pending"
          for _ in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' \
              --output text)

            echo "SSM command status: $STATUS"
            case "$STATUS" in
              Success|Failed|Cancelled|TimedOut|Cancelling)
                break
                ;;
            esac

            sleep 10
          done

          echo "--- STDOUT ---"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StandardOutputContent' \
            --output text

          echo "--- STDERR ---"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query 'StandardErrorContent' \
            --output text

          if [ "$STATUS" != "Success" ]; then
            exit 1
