name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2 via SSM
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Verify EC2 instance is online in SSM
        run: |
          echo "Checking if instance ${{ secrets.EC2_INSTANCE_ID }} is online..."
          STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text)
          
          if [ "$STATUS" != "Online" ]; then
            echo "::error::Instance ${{ secrets.EC2_INSTANCE_ID }} is not online (status: $STATUS)"
            exit 1
          fi
          echo "Instance is online and ready for SSM commands"

      - name: Prepare deployment script
        run: |
          # Create deployment script with proper variable substitution
          cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e
          
          cd /home/ec2-user/veris
          
          # Clone repo if not exists
          if [ ! -d ".git" ]; then
            echo "Cloning repository..."
            git clone https://x-access-token:GITHUB_TOKEN_PLACEHOLDER@github.com/REPO_URL_PLACEHOLDER.git .
          fi
          
          # Mark as safe directory (SSM runs as root, repo owned by ec2-user)
          chown -R ec2-user:ec2-user /home/ec2-user/veris
          su - ec2-user -c "git config --global --add safe.directory /home/ec2-user/veris"
          
          # Hard reset to latest main
          su - ec2-user -c "git fetch origin main && git reset --hard origin/main"
          
          # Write .env.production from GitHub secret (base64 encoded)
          echo "ENV_FILE_BASE64_PLACEHOLDER" | base64 -d > .env.production
          if [ $? -ne 0 ]; then
            echo "ERROR: Failed to decode .env.production"
            exit 1
          fi
          chown ec2-user:ec2-user .env.production
          chmod 600 .env.production
          echo "Environment file written successfully"
          
          # Stop old containers
          echo "Stopping existing containers..."
          docker compose --env-file .env.production -f docker-compose.prod.yml down || true
          
          # Build and start new containers
          echo "Building and starting containers..."
          docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
          
          echo "Deployment complete!"
          DEPLOY_SCRIPT
          
          # Replace placeholders with actual values
          sed -i "s|GITHUB_TOKEN_PLACEHOLDER|${{ github.token }}|g" /tmp/deploy.sh
          sed -i "s|REPO_URL_PLACEHOLDER|${{ github.repository }}|g" /tmp/deploy.sh
          sed -i "s|ENV_FILE_BASE64_PLACEHOLDER|${{ secrets.PROD_ENV_FILE }}|g" /tmp/deploy.sh
          
          # Make executable
          chmod +x /tmp/deploy.sh
          
          echo "Deployment script prepared successfully"

      - name: Deploy via SSM Run Command
        id: ssm
        run: |
          # Read the prepared script and escape for SSM JSON parameter
          SCRIPT_CONTENT=$(cat /tmp/deploy.sh)
          
          # Escape special characters for JSON
          SCRIPT_ESCAPED=$(echo "$SCRIPT_CONTENT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          
          # Send command via SSM
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Veris to EC2" \
            --parameters "commands=[$SCRIPT_ESCAPED]" \
            --query "Command.CommandId" \
            --output text)
          
          if [ -z "$CMD_ID" ]; then
            echo "::error::Failed to send SSM command"
            exit 1
          fi
          
          echo "command_id=$CMD_ID" >> $GITHUB_OUTPUT
          echo "SSM command sent: $CMD_ID"

      - name: Wait for SSM command to complete
        run: |
          echo "Waiting for SSM command ${{ steps.ssm.outputs.command_id }} to complete..."
          
          # Poll until complete (more reliable than 'aws ssm wait' for long deploys)
          MAX_ATTEMPTS=60
          ATTEMPT=0
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text)
            
            echo "Attempt $((ATTEMPT+1))/$MAX_ATTEMPTS - Status: $STATUS"
            
            if [ "$STATUS" = "Success" ]; then
              echo "Deployment completed successfully!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "::error::Deployment failed with status: $STATUS"
              exit 1
            fi
            
            sleep 10
            ATTEMPT=$((ATTEMPT+1))
          done
          
          echo "::error::Deployment timed out after $MAX_ATTEMPTS attempts"
          exit 1

      - name: Get deployment output
        if: always()
        run: |
          echo "=== Deployment Output ==="
          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text)
          echo "$OUTPUT"
          
          echo ""
          echo "=== Deployment Errors ==="
          ERRORS=$(aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardErrorContent" \
            --output text)
          if [ -n "$ERRORS" ] && [ "$ERRORS" != "None" ]; then
            echo "$ERRORS"
          else
            echo "No errors"
          fi
