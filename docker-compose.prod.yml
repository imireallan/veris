services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env.production
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - staticfiles:/srv/static:ro
      - media_data:/srv/media:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      ai_engine:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${SITE_URL}
        VITE_AI_API_URL: ${AI_PUBLIC_URL}
        VITE_SITE_URL: ${SITE_URL}
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      BACKEND_URL: http://backend:8000
      AI_BACKEND_URL: http://ai_engine:8001
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file:
      - .env.production
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - staticfiles:/app/staticfiles
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
      python manage.py collectstatic --noinput &&
      gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys, urllib.parse, urllib.request; host = urllib.parse.urlparse(os.environ['SITE_URL']).netloc; req = urllib.request.Request('http://127.0.0.1:8000/api/health/', headers={'Host': host, 'X-Forwarded-Proto': 'https'}); urllib.request.urlopen(req); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  ai_engine:
    build:
      context: ./ai_engine
      target: production
    env_file:
      - .env.production
    environment:
      DATABASE_URL: ${DATABASE_URL}
    expose:
      - "8001"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health'); sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  staticfiles:
  media_data:
