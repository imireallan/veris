services:
  # ── Frontend (React Router v7) ──────────────────────────────
  frontend:
    build:
      context: ./frontend
      # run the dev version locally
      target: development-dependencies-env
    ports:
      - "5173:5173"
    env_file:
      - .env
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - API_URL=http://backend:8000
      - AI_API_URL=http://ai_engine:8001
    depends_on:
      backend:
        condition: service_started

  # ── Backend (Django + DRF) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend:/app
    environment:
      - PYTHONPATH=/usr/local/lib/python3.11/site-packages
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        python manage.py migrate &&
        python manage.py runserver 0.0.0.0:8000
      "

  # ── AI Engine (FastAPI + LangChain + RAG) ───────────────────
  ai_engine:
    build:
      context: ./ai_engine
      target: development
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sustainabilityai
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_ENVIRONMENT=${PINECONE_ENVIRONMENT}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PYTHONPATH=/usr/local/lib/python3.11/site-packages
    volumes:
      - ./ai_engine:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        uvicorn main:app --host 0.0.0.0 --port 8001 --reload
      "

  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=sustainabilityai
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
